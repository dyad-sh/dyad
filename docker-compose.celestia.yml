# Celestia Light Node — Mainnet
# Wallet: celestia1vxssxrs2t27wtgur7lmqcep5zntz3nhjp48z7k
# Namespace: joy80mvp12 (AAAAAAAAAAAAAAAAAAAAAAAAAGpveTgwbXZwMTI=)
# Reference block height at deploy: 9698698

services:
  celestia-light-node:
    container_name: celestia-mainnet-node
    image: ghcr.io/celestiaorg/celestia-node:latest
    restart: unless-stopped
    ports:
      - "26658:26658"  # RPC port
      - "2121:2121"    # P2P port
    volumes:
      # Single named volume for all node data — avoids permission conflicts
      - celestia-data:/home/celestia
    environment:
      - NODE_TYPE=light
      - P2P_NETWORK=celestia
      - CELESTIA_NAMESPACE=AAAAAAAAAAAAAAAAAAAAAAAAAGpveTgwbXZwMTI=
    # Use entrypoint script to init then start with consistent paths
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Initializing Celestia Light Node..."
        celestia light init --p2p.network celestia 2>/dev/null || true
        echo "Starting Celestia Light Node..."
        exec celestia light start \
          --core.ip consensus-full.celestia-bootstrap.net \
          --p2p.network celestia \
          --rpc.addr 0.0.0.0 \
          --rpc.port 26658
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:26658/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  celestia-data:
    driver: local
